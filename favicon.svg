<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#1e1b4b"/>
      <stop offset="100%" stop-color="#4338ca"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="32" height="32" rx="8" fill="url(#g)"/>
  <!-- Glass top highlight -->
  <rect x="1" y="1" width="30" height="14" rx="7" fill="white" opacity="0.07"/>
  <!-- Accent arc — top-right corner, echoes the splash ring -->
  <path d="M 21 3 A 8 8 0 0 1 29 11"
        stroke="#818cf8" stroke-width="1.5" fill="none"
        stroke-linecap="round" opacity="0.80"/>
  <circle cx="29" cy="11" r="1.6" fill="#a5b4fc" opacity="0.90"/>
  <!-- RK monogram -->
  <text x="16" y="23"
        text-anchor="middle"
        font-family="'Arial Black', 'Arial', sans-serif"
        font-size="13" font-weight="900"
        letter-spacing="-0.5"
        fill="white">RK</text>
</svg>
